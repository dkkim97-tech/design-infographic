.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Action buttons */
.act-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border:1px solid #e5e5e5;border-radius:6px;background:#fff;color:#666;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.act-btn:hover{background:#f9fafb;border-color:#d1d5db;color:#333}
.act-btn.copied{background:#f0fdf4;border-color:#86efac;color:#16a34a}

/* Tab buttons */
.tab-btn{padding:6px 14px;border-radius:20px;border:1px solid transparent;background:transparent;color:#71717a;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn:hover{background:#e4e4e7;color:#3f3f46}
.tab-btn.active{background:#18181b;color:#fff;border-color:#18181b}

/* Admin buttons */

.admin-btn:hover{background:#fafafa;border-color:#d1d5db}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#18181b;color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.2);white-space:nowrap;transition:all .3s ease}

/* ══════════════════════════════════════
   IndexedDB
══════════════════════════════════════ */
let _db=null;
function openDB(){
  if(_db)return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(DB_STORE);
    r.onsuccess=e=>{_db=e.target.result;res(_db);};
    r.onerror=()=>rej(r.error);
  });
}
function idbSet(id,val){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).put(val,'img-'+id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);}));}
function idbGet(id){return openDB().then(db=>new Promise(res=>{const r=db.transaction(DB_STORE,'readonly').objectStore(DB_STORE).get('img-'+id);r.onsuccess=()=>res(r.result||null);r.onerror=()=>res(null);}));}
function idbDel(id){return openDB().then(db=>new Promise(res=>{const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).delete('img-'+id);tx.oncomplete=res;tx.onerror=res;}));}

/* ══════════════════════════════════════
   Migration: localStorage base64 → IndexedDB
══════════════════════════════════════ */
async function migrate(onP){
  if(localStorage.getItem(MIG_FLAG)==='1')return{skip:true};
  const raw=localStorage.getItem(EDITS_KEY);
  if(!raw){localStorage.setItem(MIG_FLAG,'1');return{skip:true};}
  let styles;
  try{styles=JSON.parse(raw);}catch(e){localStorage.setItem(MIG_FLAG,'1');return{skip:true};}
  const toMove=styles.filter(s=>s.image&&s.image.startsWith('data:'));
  if(!toMove.length){localStorage.setItem(MIG_FLAG,'1');return{skip:true};}
  onP&&onP(0,toMove.length);
  const cleaned=styles.map(s=>s.image&&s.image.startsWith('data:')?{...s,image:'__idb__'+s.id}:s);
  for(let i=0;i<toMove.length;i++){
    try{await idbSet(toMove[i].id,toMove[i].image);}catch(e){console.warn('idb fail',e);}
    onP&&onP(i+1,toMove.length);
    await new Promise(r=>setTimeout(r,0));
  }
  try{localStorage.setItem(EDITS_KEY,JSON.stringify(cleaned));}catch(e){}
  localStorage.setItem(MIG_FLAG,'1');
  return{moved:toMove.length};
}

/* ══════════════════════════════════════

function lsLoad(k){try{const d=localStorage.getItem(k);return d?JSON.parse(d):null;}catch(e){return null;}}

/* ══════════════════════════════════════
   HOOKS
══════════════════════════════════════ */
function useImg(image,id){
  const[src,setSrc]=useState(null);
  useEffect(()=>{
    if(!image){setSrc(null);return;}
    if(image.startsWith('__idb__')){idbGet(id).then(setSrc);}
    else{setSrc(image);}
  },[image,id]);
  return src;
}

/* ══════════════════════════════════════
   FORM MODAL (Add/Edit) — URL only
══════════════════════════════════════ */
function Form({item,onClose,onSave}){
  const isEdit=!!item;
  const existImg=useImg(item?.image,item?.id);
  const[ko,setKo]=useState(item?.ko||'');
  const[en,setEn]=useState(item?.en||'');
  const[cat,setCat]=useState(item?.cat||'ARTISTIC');
  const[prompt,setPr]=useState(item?.prompt||'');
  const[imgUrl,setImgUrl]=useState((item?.image&&!item.image.startsWith('__idb__')&&!item.image.startsWith('data:'))?item.image:'');
  const[preview,setPreview]=useState(null);
  const[imgMode,setImgMode]=useState('url'); // 'url' or 'file'
  const[fileData,setFileData]=useState(null); // base64 from file upload
  const[previewErr,setPreviewErr]=useState(false);

  // Google Drive URL 자동 변환
  const convertGDriveUrl=(url)=>{
    if(!url)return url;
    // https://drive.google.com/file/d/FILE_ID/view?...
    const m1=url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
    if(m1)return 'https://drive.google.com/uc?export=view&id='+m1[1];
    // https://drive.google.com/open?id=FILE_ID
    const m2=url.match(/drive\.google\.com\/open\?id=([^&]+)/);
    if(m2)return 'https://drive.google.com/uc?export=view&id='+m2[1];
    // https://lh3.googleusercontent.com/d/FILE_ID
    const m3=url.match(/lh3\.googleusercontent\.com\/d\/([^\/\?]+)/);
    if(m3)return 'https://lh3.googleusercontent.com/d/'+m3[1];
    return url;
  };

  const handleUrlChange=(val)=>{
    setImgUrl(val);
    setPreviewErr(false);
    const converted=convertGDriveUrl(val.trim());
    setPreview(converted);
  };

  // 파일 업로드 → base64
  const handleFile=(e)=>{
    const f=e.target.files[0];
    if(!f)return;
    if(f.size>5*1024*1024){alert('⚠️ 5MB 이하 이미지만 가능합니다');return;}
    const r=new FileReader();
    r.onload=(ev)=>{
      setFileData(ev.target.result);
      setPreview(ev.target.result);
      setPreviewErr(false);
    };
    r.readAsDataURL(f);
  };

  const save=async()=>{
    if(!ko.trim()||!prompt.trim())return;
    let finalImage=item?.image||null;

    if(imgMode==='file'&&fileData){
      // 파일 업로드: IndexedDB에 저장
      const newId=item?.id||Date.now();
      try{await idbSet(newId,fileData);finalImage='__idb__'+newId;}catch(e){console.warn('idb save err',e);}
    }else if(imgMode==='url'&&imgUrl.trim()){
      // URL: Google Drive 자동 변환 적용
      finalImage=convertGDriveUrl(imgUrl.trim());
    }

    const d={
      id:item?.id||Date.now(),
      cat,
      ko:ko.trim(),
      en:en.trim(),
      prompt:prompt.trim(),
      image:finalImage,
      grad:item?.grad||`linear-gradient(135deg,${CC[cat]||'#888'}22,${CC[cat]||'#888'}88)`
    };
    onSave(d);onClose();
  };

  const labelStyle={fontSize:12,fontWeight:600,color:'#52525b',marginBottom:4,display:'block'};
  const inputStyle={width:'100%',padding:'8px 12px',borderRadius:8,border:'1.5px solid #e5e5e5',fontSize:13,outline:'none',marginBottom:12};
  const tabStyle=(active)=>({flex:1,padding:'7px 0',borderRadius:6,border:'1px solid '+(active?'#18181b':'#e5e5e5'),background:active?'#18181b':'#fff',color:active?'#fff':'#666',fontSize:12,fontWeight:600,cursor:'pointer',textAlign:'center'});

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()} style={{width:440,maxWidth:'92vw',maxHeight:'90vh'}}>
        <div style={{padding:'20px 24px',borderBottom:'1px solid #f0f0f0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontWeight:900,fontSize:18,color:'#18181b'}}>{isEdit?'스타일 편집':'새 스타일 추가'}</div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#a1a1aa'}}>×</button>
        </div>
        <div style={{padding:'16px 24px 24px',overflow:'auto'}}>
          <label style={labelStyle}>카테고리</label>
          <select value={cat} onChange={e=>setCat(e.target.value)} style={{...inputStyle,cursor:'pointer'}}>
            {CAT_IN.map(c=><option key={c} value={c}>{CAT_KO[c]} ({c})</option>)}
          </select>
          <label style={labelStyle}>한글 이름</label>
          <input value={ko} onChange={e=>setKo(e.target.value)} placeholder="예: 수채화 드림" style={inputStyle}/>
          <label style={labelStyle}>영문 이름</label>
          <input value={en} onChange={e=>setEn(e.target.value)} placeholder="예: Watercolor / Soft" style={inputStyle}/>
          <label style={labelStyle}>프롬프트</label>
          <textarea value={prompt} onChange={e=>setPr(e.target.value)} placeholder="AI 이미지 생성 프롬프트..." rows={4} style={{...inputStyle,resize:'vertical',lineHeight:1.5}}/>

          {/* 이미지 입력 방식 탭 */}
          <label style={labelStyle}>이미지</label>
          <div style={{display:'flex',gap:6,marginBottom:10}}>
            <button onClick={()=>setImgMode('url')} style={tabStyle(imgMode==='url')}>🔗 URL 입력</button>
            <button onClick={()=>setImgMode('file')} style={tabStyle(imgMode==='file')}>📁 파일 업로드</button>
          </div>

          {imgMode==='url'?(
            <>
              <input value={imgUrl} onChange={e=>handleUrlChange(e.target.value)} placeholder="https://... 또는 Google Drive 공유 링크" style={inputStyle}/>
              {imgUrl.includes('drive.google.com')&&imgUrl!==convertGDriveUrl(imgUrl)&&(
                <div style={{fontSize:11,color:'#16a34a',marginBottom:8,marginTop:-8,padding:'4px 8px',background:'#f0fdf4',borderRadius:6}}>
                  ✅ Google Drive 링크가 자동 변환됩니다
                </div>
              )}
            </>
          ):(
            <>
              <input type="file" accept="image/*" onChange={handleFile} style={{...inputStyle,padding:6,cursor:'pointer'}}/>
              <div style={{fontSize:11,color:'#a1a1aa',marginBottom:8,marginTop:-8}}>JPG, PNG, WebP · 최대 5MB</div>
            </>
          )}

          {/* 미리보기 */}
          {(preview||existImg)&&(
            <div style={{position:'relative',marginBottom:12}}>
              <img
                src={preview||existImg}
                onError={()=>setPreviewErr(true)}
                onLoad={()=>setPreviewErr(false)}
                style={{width:'100%',height:140,objectFit:'cover',borderRadius:8,border:'1px solid #e5e5e5',display:previewErr?'none':'block'}}
              />
              {previewErr&&(
                <div style={{width:'100%',height:140,borderRadius:8,border:'1px solid #fecaca',background:'#fef2f2',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4}}>
                  <span style={{fontSize:20}}>⚠️</span>
                  <span style={{fontSize:11,color:'#dc2626',fontWeight:600}}>이미지를 불러올 수 없습니다</span>
                  <span style={{fontSize:10,color:'#999'}}>URL이 올바른지 확인하거나 파일 업로드를 사용하세요</span>
                </div>
              )}
            </div>
          )}

          <button onClick={save} style={{width:'100%',padding:'11px 0',borderRadius:8,border:'none',background:'#18181b',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer',marginTop:4}}>
            {isEdit?'수정 완료':'추가하기'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   MAIN APP
══════════════════════════════════════ */
function App(){
  const[styles,setStyles]=useState(null);
  const[favs,setFavs]=useState(new Set());
  const[admin,setAdmin]=useState(false);
  const[q,setQ]=useState('');
  const[active,setActive]=useState('ALL');
  const[copied,setCopied]=useState(null);
  const[detail,setDetail]=useState(null);
  const[login,setLogin]=useState(false);
  const[form,setForm]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[toast,setToast]=useState({msg:'',vis:false});
  const[mig,setMig]=useState(null);
  const importRef=useRef(null);

  const tst=msg=>{setToast({msg,vis:true});setTimeout(()=>setToast(t=>({...t,vis:false})),2200);};
  const copyText=t=>{navigator.clipboard?navigator.clipboard.writeText(t):(() =>{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);})();};

  // Load
  useEffect(()=>{
    const init=async()=>{
      // Migration
      try{
        const r=await migrate((done,total)=>setMig({done,total}));
        if(r.moved)setMig({done:r.moved,total:r.moved,complete:true});
      }catch(e){console.warn('migration err',e);}
      setTimeout(()=>setMig(null),2000);

      // Load styles
      const saved=lsLoad(EDITS_KEY);
      setStyles(saved&&Array.isArray(saved)?saved:DEFAULTS);

      // Load favs
      const f=lsLoad(FAVS_KEY);
      if(f&&Array.isArray(f))setFavs(new Set(f));
    };
    init();
  },[]);

  // Persist
  useEffect(()=>{if(styles)lsSave(EDITS_KEY,styles);},[styles]);
  useEffect(()=>{lsSave(FAVS_KEY,[...favs]);},[favs]);

  const toggleFav=id=>setFavs(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  const doCopy=s=>{copyText(s.prompt);setCopied(s.id);tst('✓ 프롬프트가 복사되었습니다');setTimeout(()=>setCopied(null),2000);};
  const doSave=async d=>{
    const exists=styles.find(s=>s.id===d.id);
    if(exists){setStyles(p=>p.map(s=>s.id===d.id?{...s,...d}:s));}
    else{setStyles(p=>[d,...p]);}
    tst(exists?'✅ 수정되었습니다':'✅ 추가되었습니다');
  };
  const doDel=id=>{if(!window.confirm('정말 삭제하시겠습니까?'))return;idbDel(id);setStyles(p=>p.filter(s=>s.id!==id));tst('삭제되었습니다');};
  const doExport=()=>{const b=new Blob([JSON.stringify(styles,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='design-styles-myway75.json';a.click();URL.revokeObjectURL(a.href);tst('📦 내보내기 완료');};
  const doImport=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d)){setStyles(d);tst('✅ '+d.length+'개 가져오기 완료');}}catch(e){tst('⚠️ JSON 형식 오류');}e.target.value='';};r.readAsText(f);};

  if(styles===null)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#a1a1aa',fontSize:14}}>불러오는 중...</div>;

  const filtered=styles.filter(s=>{
    if(active==='FAVORITES'&&!favs.has(s.id))return false;
    if(active!=='ALL'&&active!=='FAVORITES'&&s.cat!==active)return false;
    if(q&&!s.ko.includes(q)&&!s.en.toLowerCase().includes(q.toLowerCase())&&!s.prompt.toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  });

  return(
    <div style={{minHeight:'100vh',background:'#f4f4f5'}}>
      {/* Migration banner */}
      {mig&&!mig.complete&&(
        <div className="mig-banner">
          <span style={{animation:'pulse 1.5s infinite'}}>⏳</span>
          이미지 마이그레이션 중... {mig.done}/{mig.total}
          <div className="mig-bar"><div className="mig-fill" style={{width:`${mig.total?(mig.done/mig.total*100):0}%`}}/></div>
        </div>
      )}

      {/* HEADER */}
      <header style={{background:'#fff',borderBottom:'1px solid #e8e8e8',position:'sticky',top:0,zIndex:100}}>
        <div className="header-inner" style={{maxWidth:1280,margin:'0 auto',padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:16}}>
          {/* Logo */}
          <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
            <span style={{fontSize:20}}>⚡</span>
            <div>
              <div style={{fontWeight:900,fontSize:16,color:'#18181b',letterSpacing:'-0.5px',lineHeight:1}}>DESIGN_INDEX</div>
              <div style={{fontSize:10,color:'#a1a1aa',fontFamily:"'IBM Plex Mono',monospace",letterSpacing:'.5px'}}>by Myway 75</div>
            </div>
          </div>

          {/* Search */}
          <div className="search-wrap">
            {I.search}
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="스타일 검색..."/>
          </div>

          {/* Right buttons */}
          <div style={{display:'flex',gap:6,flexShrink:0}}>
            <button className="admin-btn" onClick={()=>{copyText(SITE_URL);tst('✓ URL 복사: '+SITE_URL);}}>{I.link} URL 복사</button>
            {admin?(
              <>
                <button className="admin-btn" onClick={()=>{setEditItem(null);setForm(true);}}>{I.plus} 추가</button>
                <button className="admin-btn" onClick={doExport}>{I.dl} 내보내기</button>
                <label className="admin-btn" style={{cursor:'pointer'}}>{I.ul} 가져오기<input ref={importRef} type="file" accept=".json" onChange={doImport} style={{display:'none'}}/></label>
                <button className="admin-btn" onClick={()=>setAdmin(false)} style={{color:'#ef4444'}}>🔓 로그아웃</button>
              </>
            ):(
              <button className="admin-btn" onClick={()=>setLogin(true)}>{I.lock} 관리자</button>
            )}
          </div>
        </div>

        {/* Category tabs */}
        <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px 12px',display:'flex',gap:6,overflowX:'auto'}} className="tab-row">
          {CATS.map(c=>(
            <button key={c} className={`tab-btn${active===c?' active':''}`} onClick={()=>setActive(c)}>
              {c==='ALL'?`전체 (${styles.length})`:c==='FAVORITES'?`♥ 즐겨찾기 (${[...favs].filter(id=>styles.some(s=>s.id===id)).length})`:(CAT_KO[c]||c)}
            </button>
          ))}
        </div>
      </header>

      {/* GRID */}
      <main style={{maxWidth:1280,margin:'0 auto',padding:'20px 24px 40px'}}>
        {filtered.length===0?(
          <div style={{textAlign:'center',padding:'80px 0'}}>
            <div style={{fontSize:40,marginBottom:12,opacity:.15}}>{active==='FAVORITES'?'♡':'🔍'}</div>
            <div style={{color:'#a1a1aa',fontSize:14}}>{active==='FAVORITES'?'즐겨찾기한 스타일이 없습니다':'검색 결과가 없습니다'}</div>
          </div>
        ):(
          <div className="grid-4" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(265px,1fr))',gap:18}}>
            {filtered.map((s,i)=>(
              <div key={s.id} className="card-enter" style={{animationDelay:`${i*.03}s`}}>
                <Card s={s} fav={favs.has(s.id)} admin={admin} onFav={toggleFav} onCopy={doCopy} copied={copied} onView={setDetail} onEdit={s=>{setEditItem(s);setForm(true);}} onDel={doDel}/>
              </div>
            ))}
          </div>
        )}
      </main>

      {/* FOOTER */}
      <footer style={{textAlign:'center',padding:'16px 0 28px',borderTop:'1px solid #e8e8e8',color:'#a1a1aa',fontSize:11,fontFamily:"'IBM Plex Mono',monospace",background:'#fff'}}>
        Design by Myway 75 — {styles.length} styles
      </footer>

      {/* MODALS */}
      {detail&&<Detail s={detail} onClose={()=>setDetail(null)} onCopy={doCopy} copied={copied}/>}
      {login&&<Login onClose={()=>setLogin(false)} onLogin={()=>{setAdmin(true);tst('관리자 모드 활성화');}}/>}
      {form&&admin&&<Form item={editItem} onClose={()=>{setForm(false);setEditItem(null);}} onSave={doSave}/>}
      <Toast msg={toast.msg} vis={toast.vis}/>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
